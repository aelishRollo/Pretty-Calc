<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculator</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Loading overlay for randomizer -->
    <div id="spinner" aria-hidden="true">
      <div class="spinner-ring" aria-label="Loading"></div>
    </div>

    <div class="wrapper">
      <div id="calculator" role="application" aria-label="Calculator">
        <header class="display" aria-hidden="false">
          <div class="display-inner" role="status" aria-live="polite" aria-atomic="true">
            <div class="display-controls" aria-label="Advanced Controls">
              <button class="ctrl-btn" data-key="modeMain" aria-label="Main Mode">MAIN</button>
              <button class="ctrl-btn" data-key="modeAbc" aria-label="ABC Mode">ABC</button>
              <button class="ctrl-btn" data-key="modeFunc" aria-label="Function Mode">FUNC</button>
              <button class="ctrl-btn" data-key="toggleAngle" id="angleBtn" aria-label="Toggle Angle Mode">DEG</button>
              <button class="ctrl-btn" data-key="toggleFrac" id="fracBtn" aria-label="Toggle Fraction Output">DEC</button>
              <button class="ctrl-btn" data-key="ans" aria-label="Insert ans">ANS</button>
            </div>
            <div class="mode-keys" id="modeKeys" aria-label="Mode Keys">
              <button class="ctrl-btn ctrl-btn-mini" data-key="modeSlot0" aria-label="Mode Key 1">A</button>
              <button class="ctrl-btn ctrl-btn-mini" data-key="modeSlot1" aria-label="Mode Key 2">B</button>
              <button class="ctrl-btn ctrl-btn-mini" data-key="modeSlot2" aria-label="Mode Key 3">C</button>
              <button class="ctrl-btn ctrl-btn-mini" data-key="modeSlot3" aria-label="Mode Key 4">D</button>
              <button class="ctrl-btn ctrl-btn-mini" data-key="modeSlot4" aria-label="Mode Key 5">E</button>
            </div>
            <div class="history" id="history"></div>
            <div class="value" id="value">0</div>
          </div>
        </header>

        <main class="keys" aria-label="Calculator keypad">
          <!-- Row 1: AC, ±, (), ÷ -->
          <button class="key fn" data-key="clear" aria-label="All Clear">AC</button>
          <button class="key fn" data-key="sign" aria-label="Toggle Sign">±</button>
          <button class="key fn" data-key="parenToggle" aria-label="Parentheses">()</button>
          <button class="key op" data-key="divide" aria-label="Divide">÷</button>

          <!-- Row 2: 7 8 9 × -->
          <button class="key" data-key="7">7</button>
          <button class="key" data-key="8">8</button>
          <button class="key" data-key="9">9</button>
          <button class="key op" data-key="multiply" aria-label="Multiply">×</button>

          <!-- Row 3: 4 5 6 − -->
          <button class="key" data-key="4">4</button>
          <button class="key" data-key="5">5</button>
          <button class="key" data-key="6">6</button>
          <button class="key op" data-key="minus" aria-label="Minus">−</button>

          <!-- Row 4: 1 2 3 + -->
          <button class="key" data-key="1">1</button>
          <button class="key" data-key="2">2</button>
          <button class="key" data-key="3">3</button>
          <button class="key op" data-key="plus" aria-label="Plus">+</button>

          <!-- Row 5: 🎲 0  = (wide) -->
          <button class="key" data-key="mystery" aria-label="Randomize Theme" title="Randomize Theme">
            <span class="emoji-dice" aria-hidden="true">🎲</span>
            <span class="sr-only">Randomize Theme</span>
          </button>
          <button class="key" data-key="0" aria-label="Zero">0</button>
          <button class="key eq" data-key="equals" aria-label="Equals">=</button>
        </main>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
